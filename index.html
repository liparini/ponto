<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Firebase Login</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
  body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; background: #f5f5f5; }
  input { display: block; width: 100%; padding: 10px; margin: 8px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
  button { padding: 12px 24px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 8px; }
  #log { margin-top: 20px; background: #1e1e1e; color: #0f0; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; min-height: 120px; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>🔥 Teste Firebase Login</h2>
<input type="email" id="email" placeholder="E-mail" />
<input type="password" id="senha" placeholder="Senha" />
<button onclick="testar()">Testar Login</button>
<div id="log">Aguardando...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2ZyJ2FmcDVX_2Icrr1xSsbKzQ5eVW-Xs",
  authDomain: "ponto-1593b.firebaseapp.com",
  projectId: "ponto-1593b",
  storageBucket: "ponto-1593b.firebasestorage.app",
  messagingSenderId: "337444926131",
  appId: "1:337444926131:web:6c625d516ae9d927fbb6c6"
};

function log(msg) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('pt-BR');
  el.textContent += '\n[' + time + '] ' + msg;
  console.log(msg);
}

log('Inicializando Firebase...');
try {
  firebase.initializeApp(firebaseConfig);
  log('✅ Firebase inicializado');
} catch(e) {
  log('❌ Erro ao inicializar: ' + e.message);
}

const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (user) {
    log('✅ onAuthStateChanged: logado como ' + user.email);
    log('   UID: ' + user.uid);
    document.getElementById('log').style.color = '#0f0';
  } else {
    log('ℹ️  onAuthStateChanged: nenhum usuário logado');
  }
});

async function testar() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  log('→ Tentando login com: ' + email);
  try {
    const cred = await auth.signInWithEmailAndPassword(email, senha);
    log('✅ signInWithEmailAndPassword OK: ' + cred.user.email);
  } catch(e) {
    log('❌ Erro: [' + e.code + '] ' + e.message);
  }
}
</script>
</body>
</html>
